<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 y Media</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.38);
    --rule: rgba(255,255,255,0.16);
    --rule-thick: rgba(255,255,255,0.22);
    --card-bg: #f0ede6;
    --card-red: #c8222e;
    --card-black: #141414;
    --danger: #e0364a;
    --radius-btn: 40px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── Intro screen ───────────────────────────── */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(24px, 5vw, 48px);
    transition: opacity 0.45s ease;
    overflow: hidden;
  }

  #intro.hiding {
    opacity: 0;
    pointer-events: none;
  }

  .intro-title {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: clamp(20px, 4vw, 40px);
  }

  .intro-line {
    display: block;
    font-size: clamp(2.4rem, 9.5vw, 6.5rem);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: #ffffff;
  }

  /* ─── Game area ───────────────────────────────── */
  #game {
    width: 100%;
    max-width: 680px;
    padding: 24px 24px 130px;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
  }

  /* ─── Each section ────────────────────────────── */
  .area {
    display: flex;
    flex-direction: column;
  }

  #dealer-area { padding-bottom: 36px; }
  #player-area { padding-top: 36px; }

  .area.win-glow .hand {
    animation: winGlow 0.9s ease forwards;
  }

  @keyframes winGlow {
    0%   { filter: brightness(1); }
    40%  { filter: brightness(1.4); }
    100% { filter: brightness(1); }
  }

  /* Row: label centered */
  .area-bar {
    display: flex;
    justify-content: center;
    padding: 18px 0 12px;
  }

  .area-label {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-dim);
    text-align: center;
  }

  /* Hand container */
  .hand {
    position: relative;
    height: 180px;
    display: flex;
    justify-content: center;
    overflow: visible;
    padding-bottom: 16px;
  }

  /* Big score typography behind cards */
  .score-bg {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(5rem, 16vw, 9rem);
    font-weight: 900;
    letter-spacing: -0.06em;
    line-height: 1;
    color: rgba(255,255,255,0.11);
    user-select: none;
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
    transition: color 0.3s;
  }

  .score-bg.danger { color: rgba(224,54,74,0.18); }
  .score-bg.good   { color: rgba(255,255,255,0.2); }

  /* ─── Cards ───────────────────────────────────── */
  .card {
    width: 72px;
    height: 104px;
    border-radius: 9px;
    background: var(--card-bg);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6px 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.65), 0 1px 3px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
    animation: cardDeal 0.32s cubic-bezier(0.34,1.4,0.64,1) forwards;
    flex-shrink: 0;
  }

  @keyframes cardDeal {
    from { opacity: 0; scale: 0.78; }
    to   { opacity: 1; scale: 1; }
  }

  /* Top-left corner */
  .card-corner {
    font-size: 0.8rem;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  /* Bottom-right corner */
  .card-corner.br {
    transform: rotate(180deg);
    align-self: flex-end;
  }

  /* Center suit */
  .card-suit-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.7rem;
    line-height: 1;
    opacity: 0.65;
    user-select: none;
  }

  .card.red .card-corner,
  .card.red .card-suit-center { color: var(--card-red); }

  .card.black .card-corner,
  .card.black .card-suit-center { color: var(--card-black); }

  /* Card back */
  .card.back {
    background: #1c1c1c;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .card.back::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.1);
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 1.5px,
      transparent 1.5px, transparent 7px
    );
  }

  /* Divider between sections */
  .mid-divider {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    gap: 16px;
  }

  .mid-divider::before,
  .mid-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* ─── Sticky controls ─────────────────────────── */
  #controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    display: flex;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(13,13,13,0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-btn);
  }

  .btn {
    padding: 12px 28px;
    border-radius: var(--radius-btn);
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    outline: none;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.22; cursor: not-allowed; pointer-events: none; }

  /* Pedir — white filled */
  .btn-pedir {
    background: var(--text);
    color: var(--bg);
    border: none;
  }
  .btn-pedir:hover:not(:disabled) {
    background: #d8d8d8;
  }

  /* Plantarse — white outlined */
  .btn-plantarse {
    background: transparent;
    color: var(--text);
    border: 1.5px solid rgba(255,255,255,0.35);
  }
  .btn-plantarse:hover:not(:disabled) {
    border-color: var(--text);
    background: rgba(255,255,255,0.06);
  }

  /* Nueva Partida */
  .btn-nueva {
    background: transparent;
    color: var(--text);
    border: 1.5px solid rgba(255,255,255,0.35);
    display: none;
  }
  .btn-nueva.visible {
    display: block;
  }
  .btn-nueva:hover {
    border-color: var(--text);
    background: rgba(255,255,255,0.06);
  }

  /* ─── Result overlay ─────────────────────────── */
  #result-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,13,0.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  #result-overlay.show {
    display: flex;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .result-card {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    padding: 44px 52px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    animation: popIn 0.3s cubic-bezier(0.34,1.4,0.64,1) forwards;
  }

  @keyframes popIn {
    from { transform: scale(0.82) translateY(24px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .result-title {
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .result-title.lose { color: var(--danger); }

  .result-sub {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 28px;
    line-height: 1.5;
    font-weight: 400;
  }

  /* ─── Bust flash ──────────────────────────────── */
  .bust-flash {
    position: fixed;
    inset: 0;
    background: rgba(224,54,74,0.1);
    pointer-events: none;
    z-index: 50;
    animation: bustFlash 0.45s ease forwards;
  }

  @keyframes bustFlash {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ─── Polaroid drop ──────────────────────────── */
  .polaroid-drop {
    position: fixed;
    z-index: 201;
    width: 104px;
    background: #fff;
    padding: 7px 7px 26px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.2);
    pointer-events: none;
    transform-origin: center center;
    animation: polaroidFall 1.3s cubic-bezier(0.4, 0, 0.8, 1) forwards;
  }

  .polaroid-drop img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    display: block;
    filter: grayscale(1);
  }

  @keyframes polaroidFall {
    0%   { opacity: 1;   transform: rotate(var(--r0)) translateY(0px); }
    60%  { opacity: 1; }
    100% { opacity: 0;   transform: rotate(var(--r1)) translateY(300px); }
  }

  /* ─── Responsive ──────────────────────────────── */
  @media (max-width: 480px) {
    .card { width: 62px; height: 92px; }
    .card-suit-center { font-size: 1.4rem; }
    .btn { padding: 11px 20px; font-size: 0.7rem; }
    .result-card { padding: 36px 28px; }
    .result-title { font-size: 2.4rem; }
  }
</style>
</head>
<body>

<!-- ─── Intro screen ──────────────────────────────── -->
<div id="intro">
  <div></div>
  <div class="intro-title">
    <span class="intro-line">Sunday's</span>
    <span class="intro-line">design team</span>
    <span class="intro-line">joins</span>
    <span class="intro-line">Gambling</span>
  </div>
  <button class="btn btn-pedir" id="btn-start" style="align-self:flex-start">Nueva Partida →</button>
</div>

<main id="game">

  <section class="area" id="dealer-area">
    <div class="area-bar">
      <span class="area-label">Banca</span>
    </div>
    <div class="hand" id="dealer-hand">
      <div class="score-bg" id="dealer-score-bg"></div>
    </div>
  </section>

  <div class="mid-divider">vs</div>

  <section class="area" id="player-area">
    <div class="area-bar">
      <span class="area-label">Jugador</span>
    </div>
    <div class="hand" id="player-hand">
      <div class="score-bg" id="player-score-bg"></div>
    </div>
  </section>

</main>

<div id="controls">
  <button class="btn btn-pedir"    id="btn-pedir"    disabled>Pedir</button>
  <button class="btn btn-plantarse" id="btn-plantarse" disabled>Plantarse</button>
  <button class="btn btn-nueva visible" id="btn-nueva">Nueva Partida</button>
</div>

<div id="result-overlay">
  <div class="result-card">
    <div class="result-label" id="result-label">Resultado</div>
    <div class="result-title" id="result-title">—</div>
    <div class="result-sub"   id="result-sub"></div>
    <button class="btn btn-pedir" style="width:100%" onclick="newGame()">Nueva Partida</button>
  </div>
</div>

<script>
// ─── Deck ─────────────────────────────────────────────────────────────────
const SUITS  = ['♠','♥','♦','♣'];
const VALUES = [1,2,3,4,5,6,7,'J','Q','K'];
const RED    = new Set(['♥','♦']);

function getValue(card) {
  return ['J','Q','K'].includes(card.value) ? 0.5 : card.value;
}

function buildDeck() {
  const deck = [];
  for (const suit of SUITS)
    for (const value of VALUES)
      deck.push({ suit, value });
  return deck;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function calcScore(hand) {
  return hand.reduce((s, c) => s + getValue(c), 0);
}

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Number.isInteger(n) ? String(n) : n.toFixed(1).replace('.0','');
}

// ─── State ────────────────────────────────────────────────────────────────
const state = {
  deck: [],
  playerHand: [],
  dealerHand: [],
  phase: 'idle'   // idle | player | dealer | ended
};

// ─── DOM refs ─────────────────────────────────────────────────────────────
const $dealerHand   = document.getElementById('dealer-hand');
const $playerHand   = document.getElementById('player-hand');
const $dealerBg     = document.getElementById('dealer-score-bg');
const $playerBg     = document.getElementById('player-score-bg');
const $btnPedir     = document.getElementById('btn-pedir');
const $btnPlant     = document.getElementById('btn-plantarse');
const $btnNueva     = document.getElementById('btn-nueva');
const $overlay      = document.getElementById('result-overlay');
const $resultLabel  = document.getElementById('result-label');
const $resultTitle  = document.getElementById('result-title');
const $resultSub    = document.getElementById('result-sub');
const $playerArea   = document.getElementById('player-area');
const $dealerArea   = document.getElementById('dealer-area');

// ─── Card element ─────────────────────────────────────────────────────────
function cardEl(card, faceDown = false, delay = 0) {
  const el = document.createElement('div');
  el.className = 'card';
  el.style.animationDelay = `${delay}ms`;

  if (faceDown) {
    el.classList.add('back');
    return el;
  }

  const isRed = RED.has(card.suit);
  el.classList.add(isRed ? 'red' : 'black');

  const v = String(card.value);
  el.innerHTML = `
    <div class="card-corner">${v}<br>${card.suit}</div>
    <div class="card-suit-center">${card.suit}</div>
    <div class="card-corner br">${v}<br>${card.suit}</div>
  `;
  return el;
}

// ─── Fan rendering ────────────────────────────────────────────────────────
function renderHand(container, hand, hideFirst = false) {
  // keep score-bg (first child), replace all cards after it
  while (container.children.length > 1) {
    container.removeChild(container.lastChild);
  }

  const N = hand.length;
  if (!N) return;

  const totalAngle = Math.min(38, (N - 1) * 10);
  const totalX     = Math.min(190, (N - 1) * 34);

  hand.forEach((card, i) => {
    const el  = cardEl(card, hideFirst && i === 0, i * 85);
    const t   = N === 1 ? 0 : (i / (N - 1)) - 0.5;
    const rot = t * totalAngle;
    const x   = t * totalX;

    el.style.position        = 'absolute';
    el.style.bottom          = '0';
    el.style.left            = '50%';
    el.style.transformOrigin = '50% 115%';
    el.style.transform       = `translateX(calc(-50% + ${x}px)) rotate(${rot}deg)`;
    el.style.zIndex          = String(i + 1);

    container.appendChild(el);
  });
}

// ─── Score display ────────────────────────────────────────────────────────
function updateScores() {
  const ps = calcScore(state.playerHand);
  const ds = calcScore(state.dealerHand);

  $playerBg.textContent = state.playerHand.length ? fmt(ps) : '';
  $playerBg.className   = 'score-bg' + (ps > 7.5 ? ' danger' : ps === 7.5 ? ' good' : '');

  const dealerVisible = state.phase === 'dealer' || state.phase === 'ended';
  $dealerBg.textContent = (state.dealerHand.length && dealerVisible) ? fmt(ds) : '';
  $dealerBg.className   = 'score-bg' + (ds > 7.5 ? ' danger' : ds === 7.5 ? ' good' : '');
}

// ─── Controls ─────────────────────────────────────────────────────────────
function setControls(pedir, plant, nueva) {
  $btnPedir.disabled = !pedir;
  $btnPlant.disabled = !plant;
  $btnNueva.className = 'btn btn-nueva' + (nueva ? ' visible' : '');
}

// ─── New game ─────────────────────────────────────────────────────────────
function newGame() {
  $overlay.classList.remove('show');
  $playerArea.classList.remove('win-glow');
  $dealerArea.classList.remove('win-glow');

  state.deck       = shuffle(buildDeck());
  state.playerHand = [];
  state.dealerHand = [];
  state.phase      = 'player';

  state.playerHand.push(state.deck.pop());
  state.dealerHand.push(state.deck.pop());

  renderHand($playerHand, state.playerHand);
  renderHand($dealerHand, state.dealerHand, true); // face-down until player stands
  updateScores();

  const ps = calcScore(state.playerHand);
  if (ps === 7.5) {
    setControls(false, false, false);
    setTimeout(endGame, 700);
    return;
  }

  setControls(true, true, false);
}

// ─── Player hits ──────────────────────────────────────────────────────────
function playerHit() {
  if (state.phase !== 'player') return;

  state.playerHand.push(state.deck.pop());
  renderHand($playerHand, state.playerHand);
  updateScores();

  const ps = calcScore(state.playerHand);

  if (ps > 7.5) {
    bustFlash();
    state.phase = 'ended';
    setControls(false, false, false);
    setTimeout(() => showResult('lose', ps, null), 550);
  } else if (ps === 7.5) {
    setControls(false, false, false);
    setTimeout(playerStand, 550);
  }
}

// ─── Player stands ────────────────────────────────────────────────────────
function playerStand() {
  if (state.phase !== 'player') return;

  state.phase = 'dealer';
  setControls(false, false, false);

  renderHand($dealerHand, state.dealerHand);
  updateScores();

  // Dealer plays after brief pause
  setTimeout(dealerStep, 900);
}

// ─── Dealer auto-play ─────────────────────────────────────────────────────
function dealerStep() {
  const ps = calcScore(state.playerHand);
  const ds = calcScore(state.dealerHand);

  if (ds < ps && ds <= 7.5 && state.deck.length > 0) {
    state.dealerHand.push(state.deck.pop());
    renderHand($dealerHand, state.dealerHand);
    updateScores();
    setTimeout(dealerStep, 700);
  } else {
    endGame();
  }
}

// ─── End game ─────────────────────────────────────────────────────────────
function endGame() {
  state.phase = 'ended';
  renderHand($dealerHand, state.dealerHand);
  updateScores();

  const ps = calcScore(state.playerHand);
  const ds = calcScore(state.dealerHand);

  let outcome;
  if      (ps > 7.5)  outcome = 'lose';
  else if (ds > 7.5)  outcome = 'win';
  else if (ps > ds)   outcome = 'win';
  else if (ds >= ps)  outcome = 'lose';  // dealer wins ties

  setTimeout(() => showResult(outcome, ps, ds), 500);
}

// ─── Show result ──────────────────────────────────────────────────────────
function showResult(outcome, ps, ds) {
  if (outcome === 'win') {
    $resultLabel.textContent  = '7 y Media';
    $resultTitle.textContent  = 'Ganaste';
    $resultTitle.className    = 'result-title';
    $resultSub.textContent    = ds !== null
      ? `Tu puntuación: ${fmt(ps)}  ·  Banca: ${fmt(ds)}`
      : `Puntuación: ${fmt(ps)}`;
    $playerArea.classList.add('win-glow');
  } else if (outcome === 'lose') {
    $resultLabel.textContent  = '7 y Media';
    $resultTitle.textContent  = 'Perdiste';
    $resultTitle.className    = 'result-title lose';
    $resultSub.textContent    = ps > 7.5
      ? `Te pasaste con ${fmt(ps)}`
      : ds !== null
        ? `Banca: ${fmt(ds)}  ·  Tú: ${fmt(ps)}`
        : `Puntuación: ${fmt(ps)}`;
    $dealerArea.classList.add('win-glow');
  }

  setControls(false, false, true);
  setTimeout(() => $overlay.classList.add('show'), 320);
}

// ─── Bust flash ───────────────────────────────────────────────────────────
function bustFlash() {
  const el = document.createElement('div');
  el.className = 'bust-flash';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 450);
}

// ─── Polaroid hover effect (intro only) ──────────────────────────────────
const PHOTOS = ['Ph/1.png', 'Ph/2.jpeg', 'Ph/3.jpeg'];
let photoIdx = 0;
let lastSpawn = 0;

document.getElementById('intro').addEventListener('mousemove', (e) => {
  if (e.target.closest('button')) return;
  const now = Date.now();
  if (now - lastSpawn < 110) return;
  lastSpawn = now;

  const src  = PHOTOS[photoIdx % PHOTOS.length];
  photoIdx++;

  const el   = document.createElement('div');
  el.className = 'polaroid-drop';

  const r0 = ((Math.random() - 0.5) * 28).toFixed(1);
  const r1 = (parseFloat(r0) + (Math.random() - 0.5) * 22).toFixed(1);
  el.style.setProperty('--r0', `${r0}deg`);
  el.style.setProperty('--r1', `${r1}deg`);
  el.style.left = `${e.clientX - 52}px`;
  el.style.top  = `${e.clientY - 16}px`;

  el.innerHTML = `<img src="${src}" alt="">`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1350);
});

// ─── Intro dismiss ────────────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', () => {
  const intro = document.getElementById('intro');
  intro.classList.add('hiding');
  setTimeout(() => { intro.style.display = 'none'; }, 450);
  newGame();
});

// ─── Listeners ────────────────────────────────────────────────────────────
$btnPedir.addEventListener('click', playerHit);
$btnPlant.addEventListener('click', playerStand);
$btnNueva.addEventListener('click', newGame);
</script>
</body>
</html>
